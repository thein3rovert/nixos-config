#cloud-config
hostname: ${hostname}

users:
  - default
  - name: thein3rovert
    groups: sudo
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    ssh_authorized_keys:
%{ for key in ssh_keys ~}
      - ${key}
%{ endfor ~}

ssh_authorized_keys:
%{ for key in ssh_keys ~}
  - ${key}
%{ endfor ~}

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - vim
  - openssh-server

runcmd:
  - systemctl enable ssh
  - systemctl start ssh
  - sleep 5
