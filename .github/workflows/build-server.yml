concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
jobs:
  validate-ssh:
    runs-on: ubuntu-latest
    steps:
      - name: Check SSH key secret exists
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "SSH_PRIVATE_KEY secret is not set!"
            exit 1
          fi
          echo "SSH_PRIVATE_KEY secret exists"
  validate-cachix:
    runs-on: ubuntu-latest
    steps:
      - name: Check Cachix auth token exists
        run: |
          if [ -z "${{ secrets.CACHIX_AUTH_TOKEN }}" ]; then
            echo "CACHIX_AUTH_TOKEN secret is not set!"
            exit 1
          fi
          echo "CACHIX_AUTH_TOKEN secret exists"
  build-nixos:
    runs-on: [self-hosted, terraform]
    needs: [validate-ssh, validate-cachix]
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add GitHub to known hosts
        run: ssh-keyscan github.com >> ~/.ssh/known_hosts
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 1
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Cachix
        uses: cachix/cachix-action@master
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          name: thein3rovert
      - name: Build nixos
        run: nix build --accept-flake-config --print-out-paths .#nixosConfigurations.nixos.config.system.build.toplevel
  build-marcus:
    runs-on: [self-hosted, terraform]
    needs: [validate-ssh, validate-cachix]
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add GitHub to known hosts
        run: ssh-keyscan github.com >> ~/.ssh/known_hosts
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 1
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Cachix
        uses: cachix/cachix-action@master
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          name: thein3rovert
      - name: Build marcus
        run: nix build --accept-flake-config --print-out-paths .#nixosConfigurations.marcus.config.system.build.toplevel
  build-bellamy:
    runs-on: [self-hosted, terraform]
    needs: [validate-ssh, validate-cachix]
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add GitHub to known hosts
        run: ssh-keyscan github.com >> ~/.ssh/known_hosts
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 1
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Cachix
        uses: cachix/cachix-action@master
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          name: thein3rovert
      - name: Build bellamy
        run: nix build --accept-flake-config --print-out-paths .#nixosConfigurations.bellamy.config.system.build.toplevel
name: build-nixos
"on":
  push:
    paths-ignore:
      - "**/*.md"
      - .github/**
      - _img/**
  workflow_dispatch: {}
