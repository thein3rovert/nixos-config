theme:
  disable-picker: true
  background-color: 0 0 16
  primary-color: 43 59 81
  positive-color: 61 66 44
  negative-color: 6 96 59

pages:
  - name: Home
    hide-desktop-navigation: true
    show-mobile-header: true
    hide-footer: true
    # head-widgets:
    #   - type: split-column
    # widgets:
    #   - type: server-stats
    #     hide-header: true
    # servers:
    #   - type: local
    #     name: Bellamy
    #     hide-mountpoints-by-default: true
    #     mountpoints:
    #       "/":
    #           hide: true
    columns:
      - size: small
        widgets:
          - type: custom-api
            title: ◆ Random Fact
            cache: 6h
            url: https://uselessfacts.jsph.pl/api/v2/facts/random
            template: |
              <p class="size-h4 color-paragraph">{{ .JSON.String "text" }}</p>
          - type: group
            widgets:
              - type: reddit
                subreddit: selfhosted
                collapse-after: 6
                app-auth:
                  name: thein3rovert-red
                  id: QNf0FF5oFlI_VXaqdMKPEA
                  secret: yvfbv5hkSsl82bWleiZh1b1PCc4BlA
              - type: reddit
                subreddit: nixos
                collapse-after: 6
                app-auth:
                  name: thein3rovert-red
                  id: QNf0FF5oFlI_VXaqdMKPEA
                  secret: yvfbv5hkSsl82bWleiZh1b1PCc4BlA
              - type: reddit
                subreddit: minilab
                collapse-after: 6
                app-auth:
                  name: thein3rovert-red
                  id: QNf0FF5oFlI_VXaqdMKPEA
                  secret: yvfbv5hkSsl82bWleiZh1b1PCc4BlA
              - type: reddit
                subreddit: obsidian
                collapse-after: 6
                app-auth:
                  name: thein3rovert-red
                  id: QNf0FF5oFlI_VXaqdMKPEA
                  secret: yvfbv5hkSsl82bWleiZh1b1PCc4BlA
      - size: full
        widgets:
          # Most Used - Quick Access
          - type: monitor
            cache: 1m
            title: ★ Quick Access
            sites:
              - title: Linkding
                same-tab: true
                timeout: 5s
                url: https://linkding.${BASE_DOMAIN}/
                icon: di:linkding.png
              - title: Freshrss
                same-tab: true
                timeout: 5s
                url: https://freshrss.${BASE_DOMAIN}/
                icon: di:freshrss.png
              - title: memos
                same-tab: true
                timeout: 5s
                url: https://memos.${BASE_DOMAIN}/
                icon: di:memos.png
              - title: Blog
                same-tab: true
                timeout: 5s
                url: https://blog.${BASE_DOMAIN}/
                icon: /assets/penguin.png

          # Automation & Workflows
          - type: monitor
            cache: 1m
            title: ⚡ Automation & Workflows
            sites:
              - title: n8n
                same-tab: true
                timeout: 5s
                url: http://n8n.l.thein3rovert.com/
                icon: di:n8n.png
              - title: Kestra
                same-tab: true
                timeout: 5s
                url: http://kestra.l.thein3rovert.com/
                icon: sh:kestra.svg

          # Development & Code
          - type: monitor
            cache: 1m
            title: ◈ Development & Code
            sites:
              - title: Forgejo
                same-tab: true
                timeout: 5s
                url: https://code.${BASE_DOMAIN}/
                icon: sh:forgejo.svg
              - title: FossFlow
                same-tab: true
                timeout: 5s
                url: http://fossflow.l.thein3rovert.com
                icon: sh:tldraw.png
              - title: ZeroByte
                same-tab: true
                timeout: 5s
                url: http://zerobyte.l.thein3rovert.com/
                icon: sh:zerobyte.png

          # Storage & Files
          - type: monitor
            cache: 1m
            title: ▦ Storage & Files
            sites:
              - title: Filebrowser
                same-tab: true
                timeout: 5s
                url: http://filebrowser.l.thein3rovert.com/
                icon: di:filebrowser-quantum.png
              - title: copyparty
                same-tab: true
                timeout: 5s
                url: http://copyparty.l.thein3rovert.com/
                icon: di:copyparty.png
              - title: s3 Console
                same-tab: true
                timeout: 5s
                url: https://minio-console.${BASE_DOMAIN}/
                icon: di:minio.png
              - title: Garage S3
                same-tab: true
                timeout: 5s
                url: http://s3-web.l.thein3rovert.com/
                icon: sh:garage.svg

          # Monitoring & Observability
          - type: monitor
            cache: 1m
            title: ◉ Monitoring & Observability
            sites:
              - title: Dockhand
                same-tab: true
                timeout: 5s
                url: http://dockhand.l.thein3rovert.com/
                icon: sh:dockhand.png
              - title: Grafana
                same-tab: true
                timeout: 5s
                url: http://grafana.l.thein3rovert.com/
                icon: di:grafana.png
              - title: Uptime Kuma
                same-tab: true
                timeout: 5s
                url: https://uptime-kuma.${BASE_DOMAIN}/
                icon: di:uptime-kuma.png
              - title: Traefik
                same-tab: true
                timeout: 5s
                url: https://${BASE_DOMAIN}
                icon: di:traefik.png

          # Infrastructure Management
          - type: monitor
            cache: 1m
            title: ▣ Infrastructure
            sites:
              - title: Incus (emily)
                same-tab: true
                timeout: 5s
                url: https://incus.l.thein3rovert.com
                icon: di:incus.png
              - title: Rancher
                same-tab: true
                timeout: 5s
                url: http://rancher.l.thein3rovert.com
                icon: sh:rancher.svg
              - title: AdGuard
                same-tab: true
                timeout: 5s
                url: http://ad-guard.l.thein3rovert.com
                icon: di:adguard-home.png
              - title: Vault
                same-tab: true
                timeout: 5s
                url: http://vault.l.thein3rovert.com
                icon: sh:hashicorp-vault.svg
              - title: Termix
                same-tab: true
                timeout: 5s
                url: http://termix.l.thein3rovert.com
                icon: sh:termix.svg
              - title: Longhorn
                same-tab: true
                timeout: 5s
                url: http://longhorn.l.thein3rovert.com/
                icon: sh:rancher-longhorn.svg

          - type: rss
            title: ◈ Thein3rovert Rss Feed
            style: horizontal-cards
            feeds:
              - url: https://freshrss.${BASE_DOMAIN}/api/query.php?user=thein3rovert&t=6d33HntnFvgHLEi43rQBMD&f=rss

          - type: videos
            title: ▶ Videos
            channels:
              #- UCDAck-gFPTrgTx_qp59-bQA # Kubernetes guy
              - UCYeiozh-4QwuC1sjgCmB92w # Devops toolbox
              - UCBZA3z_u8LPiVuIo7YUdDcg # Takuya
              - UCcdv38QxPjSMqbt5ffLhJLA
              - UCMQfWjDuns9-s37wq5vW4Tg
            style: grid-cards

          - type: hacker-news
            title: ◈ Hacker News
            limit: 15
            collapse-after: 5

      - size: small
        widgets:
          - type: search
            search-engine: google
            target: _self

          - type: clock
            title: ◷ Time
            time-format: 24h
            date-format: d MMMM yyyy
            show-seconds: true
            show-timezone: true
            timezone: Europe/London

          - type: weather
            title: ◐ Weather
            location: London, UK
            units: metric
            hour-format: 24h

          - type: bookmarks
            title: ★ Bookmarks
            groups:
              - title: Personal
                links:
                  - title: github
                    same-tab: true
                    url: https://github.com/thein3rovert
                  - title: m_incus
                    same-tab: true
                    url: https://incus-v2.l.thein3rovert.com/thein3rovert
                  - title: DevDocs
                    same-tab: true
                    url: https://devdocs.io/

              - title: Torrents
                color: 10 70 50
                links:
                  - title: TorrentHR
                    same-tab: true
                    url: https://www.torrenthr.org/login.php
          - type: calendar
            title: ◷ Calendar
            first-day-of-week: monday
